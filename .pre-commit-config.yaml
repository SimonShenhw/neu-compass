# 提交前自动跑：detect-secrets + ruff + mypy
# 安装: uv run pre-commit install

repos:
  # 严格模式: 无 baseline, 任何检测到的 secret 直接 fail
  # 私有 repo 在免费档没有 GitHub 端 push protection,
  # 所以本地 pre-commit 是唯一防线,刻意从严
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: \.env\.example$|package-lock\.json$|\.secrets\.baseline$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6
          - pydantic-settings>=2.2
          - types-requests
        args: [--ignore-missing-imports]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
